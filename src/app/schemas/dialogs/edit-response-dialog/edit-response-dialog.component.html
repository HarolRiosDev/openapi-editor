
<form #form="ngForm" (ngSubmit)="save(form)" class="dialog-form" autocomplete="off">
  <mat-dialog-content>
    

    <!-- Descripción -->
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Descripción</mat-label>
      <textarea matInput name="description" [(ngModel)]="response.description" rows="1"></textarea>
    </mat-form-field>

    <!-- Media Type -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Media Type</mat-label>
      <mat-select [(ngModel)]="mediaType" name="mediaType" required>
        <mat-option *ngFor="let option of mediaTypeOptions" [value]="option">{{ option }}</mat-option>
        <mat-option [value]="mediaType" *ngIf="mediaTypeOptions.indexOf(mediaType) === -1 && mediaType">{{ mediaType }}</mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Schema -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Schema (JSON)</mat-label>
      <mat-select [(ngModel)]="schema" name="schema" required>
        <mat-option *ngFor="let schemaName of schemaNames" [value]="schemaName">{{ schemaName }}</mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Mensaje de error -->
    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="dialogRef.close()">Cancelar</button>
    <button mat-raised-button color="primary" type="submit">Guardar</button>
  </mat-dialog-actions>
</form>
